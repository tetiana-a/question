<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis — Love</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--tt:background .5s cubic-bezier(.4,0,.2,1),color .5s cubic-bezier(.4,0,.2,1),border-color .5s cubic-bezier(.4,0,.2,1)}
[data-theme="dark"]{--bg:#080808;--bg2:#101010;--bg3:#181818;--line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);--txt:#efefef;--txt2:#909090;--txt3:#454545;--tag:rgba(255,255,255,.05);--hov:rgba(255,255,255,.03)}
[data-theme="light"]{--bg:#f7f7f5;--bg2:#eeeeed;--bg3:#e4e4e2;--line:rgba(0,0,0,.07);--line2:rgba(0,0,0,.13);--txt:#0c0c0c;--txt2:#565656;--txt3:#b0b0b0;--tag:rgba(0,0,0,.04);--hov:rgba(0,0,0,.025)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;font-weight:400;line-height:1.8;overflow-x:hidden;transition:var(--tt);font-size:18px}
::selection{background:var(--txt);color:var(--bg)}
a{color:inherit;text-decoration:none}
.wrap{max-width:900px;margin:0 auto;padding:0 48px}
@media(max-width:900px){.wrap{padding:0 28px}}
@media(max-width:480px){.wrap{padding:0 20px}}

.bg-universe{position:fixed;inset:0;z-index:-2;overflow:hidden;background:radial-gradient(ellipse at 50% 0%, #0d0d18 0%, #050508 55%, #000 100%)}
[data-theme="light"] .bg-universe{background:radial-gradient(ellipse at 50% 0%, #dfe3ee 0%, #eef0f4 55%, #f7f7f5 100%);opacity:.6}
.bg-universe video{
  position:absolute;top:50%;left:50%;width:100%;height:100%;
  transform:translate(-50%,-50%);object-fit:cover;object-position:center;
  opacity:0;transition:opacity 1.5s ease-in-out;
}
.bg-universe video.active{opacity:.55}
[data-theme="light"] .bg-universe video.active{opacity:.28}
.bg-vignette{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 50% 30%, transparent 0%, var(--bg) 85%);transition:var(--tt);pointer-events:none}
.case-box{background:color-mix(in srgb, var(--bg) 88%, transparent);backdrop-filter:blur(3px)}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:color-mix(in srgb, var(--bg) 85%, transparent);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);transition:var(--tt)}
.nav-in{max-width:900px;margin:0 auto;padding:0 48px;height:62px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:.06em;color:var(--txt)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-status{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt3)}
@media(max-width:480px){.nav-in{padding:0 20px}}

.theme-tog{width:42px;height:22px;background:var(--bg3);border:1px solid var(--line2);border-radius:11px;cursor:pointer;position:relative;flex-shrink:0;transition:var(--tt)}
.theme-tog::before{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--txt);top:3px;left:3px;transition:transform .4s cubic-bezier(.4,0,.2,1)}
[data-theme="light"] .theme-tog::before{transform:translateX(20px)}

.music-fab{position:fixed;right:22px;bottom:22px;z-index:1200;display:flex;align-items:center;gap:10px;padding:0 16px 0 12px;height:46px;border-radius:999px;background:var(--bg2);color:var(--txt);border:1px solid var(--line2);box-shadow:0 8px 24px rgba(0,0,0,.18);cursor:pointer;transition:transform .2s,opacity .2s,background .2s}
.music-fab:hover{transform:translateY(-2px);background:var(--bg3)}
.music-fab[data-on="true"]{background:var(--txt);color:var(--bg)}
.eq{display:flex;align-items:flex-end;gap:2px;height:16px;width:16px}
.eq-bar{width:3px;border-radius:2px;background:currentColor;transform-origin:bottom;animation:none}
.music-fab[data-on="true"] .eq-bar{animation:eq-anim var(--d,0.6s) ease-in-out infinite alternate}
.eq-bar:nth-child(1){--d:.5s;height:6px}
.eq-bar:nth-child(2){--d:.7s;height:12px}
.eq-bar:nth-child(3){--d:.4s;height:9px}
.eq-bar:nth-child(4){--d:.6s;height:14px}
@keyframes eq-anim{from{transform:scaleY(.25)}to{transform:scaleY(1)}}
.music-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase}

.sec{padding:120px 0 88px;border-top:1px solid var(--line)}
.sec-head{display:flex;align-items:baseline;gap:20px;margin-bottom:56px}
.sec-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);letter-spacing:.12em;flex-shrink:0}
.rv{opacity:0;transform:translateY(28px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1)}
.rv.on{opacity:1;transform:translateY(0)}
.rv-d1{transition-delay:.1s}.rv-d2{transition-delay:.2s}.rv-d3{transition-delay:.3s}.rv-d4{transition-delay:.4s}.rv-d5{transition-delay:.5s}

.case-box{border:1px solid var(--line);overflow:hidden}
.case-body{display:grid;grid-template-columns:1fr}
.c-blk{padding:44px 48px;transition:background .25s}
.c-blk:hover{background:var(--hov)}
.text-block p{font-size:16px;color:var(--txt2);margin-bottom:16px;line-height:1.8}
.text-block p.lead{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--txt);line-height:1.6;margin-bottom:0}
.text-block strong{color:var(--txt);font-weight:600}

@media(max-width:900px){
    .c-blk{padding:28px}
    .music-fab span{display:none}
}
</style>
</head>
<body>

<div class="bg-universe" id="bgUniverse">
  <video id="vid1" class="active" muted playsinline>
    <source src="9444252c5fa23f29fbe54cf6d6f950e8.mp4" type="video/mp4">
  </video>
  <video id="vid2" muted playsinline>
    <source src="5a09caf64ce1249fa6a8626ac51d2d63.mp4" type="video/mp4">
  </video>
</div>
<div class="bg-vignette"></div>

<nav>
  <div class="nav-in">
    <a href="#" class="nav-logo">TETIANA.K</a>
    <div class="nav-right">
      <button class="theme-tog" id="themeBtn" aria-label="Toggle theme"></button>
      <div class="nav-status">Love</div>
    </div>
  </div>
</nav>

<main>
    <section class="sec">
        <div class="wrap">
            <div class="sec-head rv">
                <span class="sec-num">01</span>
            </div>

            <div class="case-box rv rv-d1" style="margin-top: 40px;">
                <div class="case-body">
                    <div class="c-blk">
                        <div class="text-block">
                            <p class="lead">Любовь — это не то, что приходит к тебе. Любовь — это то, чем ты становишься.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-block rv rv-d4" style="margin-top: 40px;">
                <p>Любовь — это не тот, кто тебя спасёт. Любовь — это ты, когда ты наконец перестаёшь искать спасение снаружи и начинаешь создавать его изнутри.</p>
                <p>В этом состоянии ты по-настоящему непобедима.</p>
            </div>
        </div>
    </section>
</main>

<button class="music-fab" id="musicBtn" data-on="false" aria-label="Toggle music">
  <div class="eq">
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
  </div>
  <span class="music-lbl">Music</span>
</button>
<audio id="bgAudio" preload="none" loop><source src="Omnira - Kundalini Rising II_(mp3phoenix.net).mp3" type="audio/mpeg"></audio>

<script>
    const rvElements = document.querySelectorAll('.rv');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('on');
        });
    }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
    rvElements.forEach(el => observer.observe(el));

    const themeBtn = document.getElementById('themeBtn');
    const v1 = document.getElementById('vid1');
    const v2 = document.getElementById('vid2');

    themeBtn.addEventListener('click', () => {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);

        // dark -> первое видео, light -> второе видео
        if (newTheme === 'dark') {
            v2.currentTime = 0;
            v1.play().catch(() => {});
            v1.classList.add('active');
            v2.classList.remove('active');
        } else {
            v1.currentTime = 0;
            v2.play().catch(() => {});
            v2.classList.add('active');
            v1.classList.remove('active');
        }
    });

    const musicBtn = document.getElementById('musicBtn');
    const bgAudio = document.getElementById('bgAudio');
    musicBtn.addEventListener('click', () => {
        const isOn = musicBtn.getAttribute('data-on') === 'true';
        if (isOn) {
            bgAudio.pause();
            musicBtn.setAttribute('data-on', 'false');
        } else {
            bgAudio.play().catch(err => console.log("Audio playback failed:", err));
            musicBtn.setAttribute('data-on', 'true');
        }
    });

    // --- Запуск обоих видео (проигрывается только активное по CSS-классу) ---
    (function(){
        v1.loop = true;
        v2.loop = true;
        [v1, v2].forEach(v => v.play().catch(() => {}));
        document.addEventListener('click', () => { v1.play().catch(()=>{}); v2.play().catch(()=>{}); }, { once: true });
    })();
</script>

</body>
</html>
